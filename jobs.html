<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الوظائف | SaudiCareers</title>
    <meta name="description" content="ابحث عن وظائف حكومية وخاصة في السعودية">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        :root { --primary: #1e3a5f; --primary-light: #2d5a8e; --secondary: #0f766e; --accent: #10b981; --text: #1f2937; --text-light: #6b7280; --bg: #f8fafc; --white: #ffffff; --border: #e5e7eb; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; height: 70px; }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 20px; }
        .logo-text { color: var(--primary); font-weight: 800; font-size: 24px; }
        .logo-sub { color: var(--text-light); font-size: 12px; font-weight: 500; }
        .nav { display: flex; gap: 32px; }
        .nav a { color: var(--text); text-decoration: none; font-weight: 600; font-size: 15px; transition: color 0.2s; }
        .nav a:hover, .nav a.active { color: var(--primary); }
        .header-actions { display: flex; gap: 12px; }
        .btn { padding: 10px 24px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.2s; border: none; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-outline { background: transparent; color: var(--primary); border: 1.5px solid var(--primary); }
        .page-header { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 40px 24px; }
        .page-header h1 { font-size: 32px; font-weight: 800; text-align: center; }
        .search-section { background: var(--white); padding: 24px; border-bottom: 1px solid var(--border); }
        .search-box { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; }
        .search-input { flex: 1; padding: 14px 20px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; }
        .search-btn { background: var(--accent); color: white; border: none; padding: 14px 32px; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .filters { display: flex; gap: 12px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
        .filter-select { padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; background: var(--white); }
        .jobs-section { padding: 40px 24px; max-width: 1200px; margin: 0 auto; }
        .jobs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .jobs-count { font-size: 18px; font-weight: 700; }
        .jobs-count span { color: var(--primary); }
        .sort-select { padding: 10px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; }
        .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .job-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; transition: all 0.2s; cursor: pointer; }
        .job-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(30, 58, 95, 0.1); transform: translateY(-2px); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .job-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .job-company { color: var(--text-light); font-size: 14px; }
        .job-badge { background: rgba(16, 185, 129, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .job-details { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .job-detail { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-light); }
        .job-description { color: var(--text-light); font-size: 14px; line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .job-footer { display: flex; justify-content: space-between; align-items: center; }
        .job-salary { font-size: 16px; font-weight: 700; color: var(--primary); }
        .job-date { font-size: 13px; color: var(--text-light); }
        .load-more { text-align: center; margin-top: 40px; }
        .load-more-btn { background: var(--white); border: 1.5px solid var(--primary); color: var(--primary); padding: 14px 40px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .load-more-btn:hover { background: var(--primary); color: white; }
        .footer { background: #0f172a; color: white; padding: 40px 24px 24px; margin-top: 60px; }
        .footer-inner { max-width: 1200px; margin: 0 auto; text-align: center; }
        .footer p { color: rgba(255,255,255,0.6); font-size: 14px; }
        @media (max-width: 768px) { .nav { display: none; } .jobs-grid { grid-template-columns: 1fr; } .search-box { flex-direction: column; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">🇸🇦</div>
                <div>
                    <div class="logo-text">SaudiCareers</div>
                    <div class="logo-sub">منصة التوظيف الوطنية</div>
                </div>
            </a>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="jobs.html" class="active">الوظائف</a>
                <a href="cv-analyzer.html">تحليل السيرة</a>
                <a href="about.html">من نحن</a>
            </nav>
            <div class="header-actions">
                <a href="login.html" class="btn btn-outline">تسجيل الدخول</a>
                <a href="register.html" class="btn btn-primary">إنشاء حساب</a>
            </div>
        </div>
    </header>

    <section class="page-header">
        <h1>ابحث عن وظيفتك المثالية</h1>
    </section>

    <section class="search-section">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="المسمى الوظيفي، الشركة، أو المدينة...">
            <button class="search-btn" onclick="searchJobs()">بحث</button>
        </div>
        <div class="filters">
            <select class="filter-select" id="typeFilter" onchange="filterJobs()">
                <option value="">كل الأنواع</option>
                <option value="حكومي">حكومي</option>
                <option value="شبه حكومي">شبه حكومي</option>
                <option value="خاص">خاص</option>
            </select>
            <select class="filter-select" id="cityFilter" onchange="filterJobs()">
                <option value="">كل المدن</option>
                <option value="الرياض">الرياض</option>
                <option value="جدة">جدة</option>
                <option value="الدمام">الدمام</option>
                <option value="مكة">مكة</option>
            </select>
            <select class="filter-select" id="categoryFilter" onchange="filterJobs()">
                <option value="">كل التصنيفات</option>
                <option value="إدارة">إدارة</option>
                <option value="هندسة">هندسة</option>
                <option value="تقنية">تقنية</option>
                <option value="مالية">مالية</option>
            </select>
        </div>
    </section>

    <section class="jobs-section">
        <div class="jobs-header">
            <div class="jobs-count">عدد الوظائف: <span id="jobsCount">0</span></div>
            <select class="sort-select" id="sortSelect" onchange="sortJobs()">
                <option value="newest">الأحدث</option>
                <option value="salary-high">الأعلى راتب</option>
                <option value="salary-low">الأقل راتب</option>
            </select>
        </div>
        <div class="jobs-grid" id="jobsContainer"></div>
        <div class="load-more" id="loadMoreContainer" style="display: none;">
            <button class="load-more-btn" onclick="loadMore()">تحميل المزيد</button>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-inner">
            <p>© 2026 SaudiCareers. جميع الحقوق محفوظة.</p>
        </div>
    </footer>

    <script src="jobs-data.js"></script>
    <script>
        let allJobs = [];
        let displayedJobs = [];
        let currentPage = 1;
        const jobsPerPage = 12;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof JOBS_DATABASE !== 'undefined') {
                allJobs = JOBS_DATABASE;
            } else {
                // Fallback data if jobs-data.js fails to load
                allJobs = [
                    { id: 1, title: "مدير مشروع", company: "وزارة المالية", location: "الرياض", type: "حكومي", category: "إدارة", salary: "18000-25000 ريال", description: "إدارة مشاريع التحول الرقمي", posted: "2026-03-15" },
                    { id: 2, title: "مهندس برمجيات", company: "أرامكو", location: "الظهران", type: "خاص", category: "تقنية", salary: "25000-35000 ريال", description: "تطوير أنظمة برمجية", posted: "2026-03-14" },
                    { id: 3, title: "محلل مالي", company: "سابك", location: "جدة", type: "خاص", category: "مالية", salary: "15000-22000 ريال", description: "تحليل البيانات المالية", posted: "2026-03-13" }
                ];
            }
            displayJobs();
        });

        function displayJobs() {
            const container = document.getElementById('jobsContainer');
            const countElement = document.getElementById('jobsCount');
            const loadMoreContainer = document.getElementById('loadMoreContainer');
            
            let filteredJobs = filterJobsData();
            countElement.textContent = filteredJobs.length;
            
            const start = 0;
            const end = currentPage * jobsPerPage;
            const jobsToShow = filteredJobs.slice(start, end);
            
            container.innerHTML = jobsToShow.map(job => `
                <div class="job-card" onclick="viewJob(${job.id})">
                    <div class="job-header">
                        <div>
                            <div class="job-title">${job.title}</div>
                            <div class="job-company">${job.company}</div>
                        </div>
                        <span class="job-badge">${job.type}</span>
                    </div>
                    <div class="job-details">
                        <span class="job-detail">📍 ${job.location}</span>
                        <span class="job-detail">💼 ${job.category}</span>
                        <span class="job-detail">📅 ${job.experience || 'غير محدد'}</span>
                    </div>
                    <div class="job-description">${job.description}</div>
                    <div class="job-footer">
                        <span class="job-salary">${job.salary}</span>
                        <span class="job-date">${formatDate(job.posted)}</span>
                    </div>
                </div>
            `).join('');
            
            loadMoreContainer.style.display = filteredJobs.length > end ? 'block' : 'none';
        }

        function filterJobsData() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const cityFilter = document.getElementById('cityFilter').value;
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            return allJobs.filter(job => {
                const matchesSearch = !searchQuery || 
                    job.title.toLowerCase().includes(searchQuery) ||
                    job.company.toLowerCase().includes(searchQuery) ||
                    job.location.toLowerCase().includes(searchQuery);
                const matchesType = !typeFilter || job.type === typeFilter;
                const matchesCity = !cityFilter || job.location === cityFilter;
                const matchesCategory = !categoryFilter || job.category === categoryFilter;
                
                return matchesSearch && matchesType && matchesCity && matchesCategory;
            });
        }

        function searchJobs() {
            currentPage = 1;
            displayJobs();
        }

        function filterJobs() {
            currentPage = 1;
            displayJobs();
        }

        function sortJobs() {
            const sortValue = document.getElementById('sortSelect').value;
            
            if (sortValue === 'salary-high') {
                allJobs.sort((a, b) => extractMaxSalary(b.salary) - extractMaxSalary(a.salary));
            } else if (sortValue === 'salary-low') {
                allJobs.sort((a, b) => extractMaxSalary(a.salary) - extractMaxSalary(b.salary));
            } else {
                allJobs.sort((a, b) => new Date(b.posted) - new Date(a.posted));
            }
            
            displayJobs();
        }

        function extractMaxSalary(salaryStr) {
            const match = salaryStr.match(/(\d+)/g);
            return match ? parseInt(match[match.length - 1]) : 0;
        }

        function loadMore() {
            currentPage++;
            displayJobs();
        }

        function viewJob(id) {
            window.location.href = `job-detail.html?id=${id}`;
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'حديثاً';
            const date = new Date(dateStr);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) return 'اليوم';
            if (diffDays === 1) return 'أمس';
            if (diffDays < 7) return `منذ ${diffDays} أيام`;
            return date.toLocaleDateString('ar-SA');
        }

        // Search on Enter key
        document.getElementById('searchInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchJobs();
        });
    </script>
</body>
</html>
